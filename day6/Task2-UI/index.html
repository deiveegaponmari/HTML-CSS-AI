<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2-UI Design</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row section1"></div>
      <div class="row-form section2">
        <form class="form-section">
          <h1>Get in Touch</h1>
          <small>Nunc erat cursus tellus gravida</small>
          <!--first row..name field-->
          <div class="row-name">
            <div class="name-field">
              <label for="firstName">FIRST NAME</label>
              <input type="text" id="firstName" name="firstName" placeholder="First Name"/>
            </div>
            <div>
              <label for="lastName">LAST NAME</label>
              <input type="text"
                id="lastName"
                name="lastName"
                placeholder="Last Name"
              />
            </div>
            </div>
            <!--end first row-->
            <!--second row..email and phone-->
            <div  class="row-name">
              <div>
                <label for="email">EMAIL</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Email"
                />
              </div>
              <div>
                <label for="phone">PHONE NUMBER</label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="Phone Number"
                />
              </div>
            </div>
            <!--second row end-->
            <!--third row start-->
            <div class="row">
              <label for="message">WHAT DO YOU HAVE IN MIND</label>
              <textarea
                id="message"
                name="message"
                placeholder="Your Message"
              ></textarea>
            </div>
            <!--end third row-->
            <!--fourth row start-->
            <div class="row">
              <button type="submit">Submit</button>
            </div>
            <!--fourth row end-->
          </div>
        </form>
      </div>
      <div class="row section3">
        <div class="icons">
          <img src="./images/twitter.jpg" alt="twitter" class="icon_image" />
          <img src="./images/facebook.jpg" alt="facebook" class="icon_image" />
          <img src="./images/google.jpg" alt="google" class="icon_image" />
          <img src="./images/instagram.jpg" alt="instagram" class="icon_image"/>
        </div>
      </div>
    </div>
  </body> 
</html>
